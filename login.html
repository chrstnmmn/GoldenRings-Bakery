<!DOCTYPE html>

<html>
	<head>
		<title>Login</title>

		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1,0" />

		<!--Favicon-->
		<link rel="icon" type="image/x-icon" href="./imgsource/icon.png" />

		<!--CSS-->
		<link rel="stylesheet" href="style.css" />

		<!--Fonts-->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
	</head>
	<body>
		<header>
			<section class="header">
				<div class="wrapper">
					<div class="logo">
						<img src="./imgsource/GoldenRings Logo.png" />
					</div>
					<div class="container">
						<a href="./index.html">Home</a>
						<a href="./about.html">About</a>
						<a href="./login.html">Login</a>
						<a href="./signup.html">Sign up</a>
					</div>
				</div>
			</section>
		</header>

		<section class="login">
			<div class="wrapper">
				<div class="container">
					<div class="item01"><img src="./imgsource/donuts/kobby-mendez-WXJ33HOrzvE-unsplash.jpg" /></div>
					<div class="item02">
						<div class="usersignup">
							<h1>Welcome back!</h1>

							<div class="useremail">
								<h4>Email address</h4>
								<input type="email" />
							</div>

							<div class="userpassword">
								<h4>Password</h4>
								<input type="password" />
							</div>
						</div>

						<div class="rememberuser">
							<label class="rememberme">
								<input type="checkbox">
								<p>Remember me</p>
							</label>
							<div class="forgotpass">
								<a href="https://wallpapers.com/images/hd/scary-face-pictures-wtvdzqnwvit6n0te.jpg">Forgot password</a>
							</div>
						</div>

						<button>Log me in</button>
						<h3>- or continue with -</h3>

						<div class="iconcontainer">
							<div class="icon1">
								<img src="./imgsource/facebook.png" />
							</div>
							<div class="icon2">
								<img src="./imgsource/insta.png" />
							</div>
							<div class="icon3">
								<img src="./imgsource/google.png" />
							</div>
							<div class="icon4">
								<img src="./imgsource/twitter.png" />
							</div>
						</div>
						<a href="./signup.html">Don't have an account?</a>
					</div>
				</div>
			</div>
		</section>
	</body>
</html>
